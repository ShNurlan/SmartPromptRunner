<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartPromptRunner Dashboard</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>

<h1>SmartPromptRunner</h1>

<hr>

<h3>Project</h3>

<div id="projectName">
    No file loaded
</div>

<hr>

<h3>Progress</h3>

<div id="loadedCount">
    Loaded: 0
</div>

<div id="progress">
    Progress: 0 / 0
</div>

<div id="status">
    Status: Idle
</div>

<div id="currentPrompt">
    Current: -
</div>

<hr>

<button id="start">
    Start
</button>

<button id="pause">
    Pause
</button>

<button id="stop">
    Stop
</button>

<hr>

<h3>Log</h3>

<div id="log">

</div>

<script src="dashboard.js"></script>

</body>
</html>
