<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Prompt Runner</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>

<h2>Smart Prompt Runner</h2>

<input
    type="file"
    id="promptFile"
    accept=".txt"
>

<div id="fileInfo">
    No file selected
</div>

<hr>

<div>
    <strong>Loaded:</strong>
    <span id="loadedCount">0</span>
</div>

<div>
    <strong>Progress:</strong>
    <span id="progress">0 / 0</span>
</div>

<br>

<button id="start">
    Start
</button>

</body>

<script src="popup.js"></script>

</html>
